services:
  - type: web
    name: pm-triage-backend
    runtime: python
    plan: free
    region: singapore
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: SIM_ENABLED
        value: "1"
      - key: SIM_INTERVAL_S
        value: "3"
      - key: ALLOWED_ORIGINS
        value: "*"
      - key: TELEMETRY_RETENTION_HOURS
        value: "24"
      - key: LLM_DAILY_CALL_CAP
        value: "40"
      # Set in the Render dashboard (never committed):
      #   DATABASE_URL        - Supabase Postgres pooler DSN (persistence)
      #   APP_ACCESS_PASSWORD - crew password for state-changing actions
      #   OPENROUTER_API_KEY  - live LLM mode (absent = deterministic mock)
      - key: DATABASE_URL
        sync: false
      - key: APP_ACCESS_PASSWORD
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
